version: '3.8'

services:
  octonote:
    build:
      context: https://github.com/BuggyPasta/OctoNote.git
      dockerfile: Dockerfile
    container_name: octonote
    restart: unless-stopped
    ports:
      - "51828:51828"
    volumes:
      - octonote_data:/data/octonote
    environment:
      - NODE_ENV=production
    user: "node"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:51828/api/status"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - octonote_network

volumes:
  octonote_data:
    name: octonote_data

networks:
  octonote_network:
    name: octonote_network
    driver: bridge 