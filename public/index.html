<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OctoNote</title>
    <link rel="stylesheet" href="/css/style.css">
    <link rel="icon" type="image/svg+xml" href="/icons/octonote.svg">
</head>
<body class="app-container">
    <header>
        <div class="logo-container">
            <img src="icons/logo.svg" alt="OctoNote Logo" class="logo">
            <span class="app-title"><span class="octo">Octo</span><span class="note">Note</span></span>
        </div>
        <div class="header-actions">
            <button id="newNoteBtn" class="icon-button" title="New Note">
                <img src="icons/new.svg" alt="New Note">
            </button>
            <button id="printBtn" class="icon-button" title="Print">
                <img src="icons/print.svg" alt="Print">
            </button>
        </div>
    </header>

    <div id="menu" class="menu hidden">
        <button id="newNoteButton" class="menu-item">
            <img src="/icons/useradd.svg" alt="New Note">
            Create New Note
        </button>
        <button id="statusButton" class="menu-item">
            <img src="/icons/status.svg" alt="Status">
            Status
        </button>
        <button id="userSwitchButton" class="menu-item">
            <img src="/icons/user.svg" alt="Switch User">
            Switch User
        </button>
    </div>

    <main>
        <div id="notesList" class="notes-list">
            <!-- Notes will be populated here -->
        </div>

        <div id="noteEditor" class="note-editor hidden">
            <div class="note-view">
                <input type="text" id="noteTitle" class="note-title" placeholder="Title">
                <textarea id="noteContent" class="note-content" placeholder="Replace this with your note..."></textarea>
                <div class="note-actions">
                    <button id="deleteNoteBtn" class="action-button delete-button" title="Delete Note">
                        <img src="icons/delete_note.svg" alt="Delete Note">
                        <span>Delete</span>
                    </button>
                    <button id="copyBtn" class="action-button" title="Copy to Clipboard">
                        <img src="icons/copy.svg" alt="Copy">
                        <span>Copy</span>
                    </button>
                </div>
            </div>
        </div>
    </main>

    <div id="userModal" class="modal hidden">
        <div class="modal-content">
            <h2>Choose Your Name</h2>
            <div id="existingUsers"></div>
            <div class="user-input">
                <input type="text" id="newUserName" placeholder="Enter new name">
                <button id="createUserButton">Create</button>
            </div>
        </div>
    </div>

    <div id="statusModal" class="modal hidden">
        <div class="modal-content">
            <div id="statusContent"></div>
        </div>
    </div>

    <div id="deleteConfirmModal" class="modal hidden">
        <div class="modal-content">
            <h2>Delete Note</h2>
            <p>Are you sure you want to delete this note? This action is not reversible!</p>
            <div class="modal-actions">
                <button id="cancelDeleteBtn" class="modal-button">No, do NOT delete it</button>
                <button id="confirmDeleteBtn" class="modal-button delete">Yes, delete it for ever</button>
            </div>
        </div>
    </div>

    <script src="/js/app.js"></script>
</body>
</html>
